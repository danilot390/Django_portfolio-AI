slug: "credit_card_default_prediction"
defs:
  title: "Credit Card Default Prediction"
  order: 7
  description: |
    This project is a binary classification system built to predict whether a credit card holder will default on their next payment. Using the UCI Taiwanese credit dataset, it follows the CRISP-DM workflow to go from raw data exploration to a deployed model.
    The pipeline includes feature engineering, model comparison among Logistic Regression, Random Forest, and XGBoost modules, and focuses not just on accuracy, but furthermore, optimizing Recall and F1-Score, considering those more important metrics in fraud detection.
  short_description: "The project develops a Machine Learning system to predict the likelihood of credit card default, analyzes and explores the dataset following the CRISP-DM, and evaluates different models to identify risk customers based on demographics and historical payment windows."
  is_featured: false
  is_published: false
  github_url: "https://github.com/danilot390/financial-risk-ml"
  complexity: 3
