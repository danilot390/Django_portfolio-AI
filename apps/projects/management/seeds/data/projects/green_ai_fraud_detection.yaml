slug: "green_ai_fraud_detection"
defs:
  title: "Green-AI Fraud Detection System"
  order: 3
  description: |
    A novel hybrid Deep Learning project to combat financial fraud. It combines spiking neural networks (SNNs) for ultra-efficient initial pattern detection with a Multi-Layer Perceptron and stacking meta-learner XGBoost, and incorporates Explainable AI (XAI) techniques. This approach delivers reductions in energy consumption, while maintaining high accuracy and providing interpretable results.
  short_description: "This project proposes a novel neuromorphic-inspired hybrid fraud detection framework (SNN+MLP-XGBoost) that integrates Green AI metrics and explainability mechanisms, supported by empirical evidence demonstrating improved sustainability with competitive predictive performance."
  is_featured: true
  is_published: false
  github_url: "https://github.com/danilot390/Green-Ai-Fraud-Detection"
  complexity: 7
tags:
  - "ml"
  - "snn"
  - "cnn"
  - "green-ai"
  - "xai"
techs:
  - "python"
  - "pytorch"
  - "sklearn"
  - "xgboost"
  - "lime"
  - "codecarbon"
  - "snntorch"
  - "spikingjelly"
highlights:
  - title: "Energy Efficient Hybrid Fraud Detection"
    bullet_points:
      - "Improved detection performance through complementary model strengths"
      - "Reduced computational overhead via efficient model components"
      - "Balanced predictive performance with energy efficiency (Green AI principles)"
    impact: "High Accuracy with reduced energy consumption."
    categories:
      - "architecture"
      - "efficiency"
  - title: "Performance Improvement via Hybrid Approach"
    bullet_points:
      - "Improved classification performance over individual models"
      - "Enhanced robustness to class imbalance (Critical in fraud detection)."
      - "Captured temporal dynamics (SNNs) and static relationships (MLPs/XGBoost) in data."
      - "Reduced false positives and false negatives via meta-learning."
    impact: "More reliable fraud detection in imbalanced datasets."
    categories:
      - "performance"
      - "efficiency"
  - title: "Scalable Production-Ready ML System"
    bullet_points:
      - "End-to-end ML pipeline from data processing to deployment."
      - "Modular architecture supporting independent model updates."
      - "Supports explainability, monitoring, drift detection, and retraining."
      - "High scalability and extensibility."
    impact: "Follows the best practices for production-ready ML systems."
    categories:
      - "deployment"
