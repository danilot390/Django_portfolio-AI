profiles:
  - header: "AI Engineer | Machine Learning | Backend Systems"
    summary: |
      I am a mathematics enthusiast with a degree in Software Engineering, currently transitioning into Artificial Intelligence through an MSc in AI in Ireland. I bring over four years of experience, having built real-world web systems for government institutions, universities, and private clients, focusing on delivering scalable and reliable solutions. 
      
      My work combines software engineering expertise with AI, where I am building experience through projects involving end-to-end pipelines, from data preprocessing and model development to basic deployment and monitoring, following MLOps principles and engineering best practices.
      
      I have hands-on experience with TensorFlow, PyTorch, and scikit-learn, and I've worked across Machine Learning, Reinforcement Learning, and hybrid AI architectures. I enjoy building modular, production-oriented systems with strong focus on evaluation, monitoring, and reproducibility.
      
      I am particularly interested in Green AI, applying techniques such as pruning, quantization, and energy tracking to build efficient and sustainable AI systems.
    about_title: 'Backend Engineer transitioning into AI-driven systems and data-centric applications'
    about: |
      I am a Software Engineer with experince in backend development and enterprise web systems, working across both public institutions and academic environments.
      My professional work has primarily focused on building and maintaining web applications using Django and Laravel, supported by relational database such as PostgreSQL and MySQL.
      
      Trough these roles, I have developed a strong understandig of how to design and deliver reliable systems under real-world constraints, including performance, maintainability, and structure data handling.
      
      Currently, I am expanding my focus toward applied artificial intelligence and data-driven system design as part of my postgraduate studies and personal projects.
      This includes working with machine learning pipelines, data analysis workflows, and experimenting with models applied to structured and financial-type datasets.
      
      My interest lies in backend engineering roles where systems intersect with intelligent data processing, particularly in environments where data insights and predictive capabilities can enhance  decision-making. I am continuing to strengthen my expertise in scalable backend  architectures while processing into AI-focused engineering work.
