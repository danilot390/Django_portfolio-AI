<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

    {% block css %}
    {% endblock %}
        
</head>

<body class="bg-gray-950 text-gray-100 font-sans">

    <!-- NAV -->
    <header class="flex justify-between items-center px-8 py-6 border-b border-gray-800">
        <div class="text-xl font-bold">TRAD</div>

        <nav class="space-x-6 text-sm text-gray-300">
            <a href="{% url 'home' %}" class="hover:text-white">Home</a>
            <a href="{% url 'about' %}" class="hover:text-white">About</a>
            <a href="{% url 'projects' %}" class="hover:text-white">Projects</a>
            <a href="{% url 'experiences' %}" class="hover:text-white">Experiences</a>
            <a href="{% url 'contact:contact' %}" class="hover:text-white">Contact Me</a>
        </nav>
    </header>

    <!-- CONTENT -->
    <main class="max-w-5xl mx-auto px-6 py-16">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    
    <footer class="text-center text-sm text-gray-500 py-10 border-t border-gray-800">
        © {% now "Y" %} danilot390. Built with Django + Tailwind.
    </footer>
    
    {% block js %}
    {% endblock %}
        
</body>
</html>
